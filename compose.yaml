name: cc

services:
  cc:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    image: cc:local
    restart: always
    networks:
      - edge
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  edge:
    external: true
