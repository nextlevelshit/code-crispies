# Top-level nginx config for the cc.cloud.librete.ch container.
# Tuned for a single small VPS serving a static SPA + per-lesson HTML.
# Worker auto-scales to CPU count, generous queue depth, sendfile/aio
# zero-copy, on-the-fly gzip, and long-cache for hashed assets.

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Throughput: zero-copy disk → socket, batch TCP segments.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens off;

    # Larger hash buckets for the MIME/Cache-Control conditionals.
    types_hash_max_size 2048;

    # On-the-fly gzip — covers HTML, JSON, sitemap, manifest. Vite-emitted
    # JS/CSS/SVG also compress well. Keep level moderate (5) so the worker
    # isn't pegged on big chunks.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/manifest+json
        application/ld+json
        image/svg+xml;

    # Pre-gzipped variants if present (Vite doesn't emit by default; harmless).
    gzip_static on;

    # Per-IP rate limit zone — blunt instrument against scrapers, not used
    # in default location blocks. Available if needed for /api/.
    limit_req_zone $binary_remote_addr zone=cc_basic:10m rate=30r/s;

    # Access log to stdout (Docker captures), reduce volume on health probes.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    # Canonical-host redirect: www.codecrispi.es → codecrispi.es (apex).
    # Upstream proxy terminates TLS; we only see plain HTTP here, but the
    # Host header survives so we can detect www and 301 it.
    # Header sent uses https:// because the original request was HTTPS at
    # the proxy boundary. If an upstream sets X-Forwarded-Proto, we honor
    # that; otherwise default to https (production reality).
    server {
        listen 80;
        listen [::]:80;
        server_name www.codecrispi.es;
        return 301 https://codecrispi.es$request_uri;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Branded 404 page (noindex). Must be reachable internally only so we
        # don't accidentally serve it as a regular page on direct request.
        error_page 404 /404.html;
        location = /404.html { internal; }

        # Health check — no log, no gzip, returns 200 in microseconds.
        location = /health {
            access_log off;
            gzip off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Hashed Vite bundles in /assets/ — content-addressed, immutable forever.
        # Browser + CDN can cache aggressively; updates ship under new hash.
        location /assets/ {
            access_log off;
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Long-lived static media in /public/ (also flat in dist root).
        location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?|ttf)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=2592000" always;  # 30d
        }

        # PWA + indexer files — short cache so updates propagate fast.
        location ~* \.(webmanifest|json|xml|txt)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=300" always;  # 5m
        }

        # SPA fallback for top-level paths — client-side router decides what
        # to render. HTML cache short so deploys take effect quickly.
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }
    }
}
