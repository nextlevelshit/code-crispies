adapters:
    claude:
        binary: claude
        default_permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
            deny: []
        mode: headless
        output_format: json
        project_files:
            - CLAUDE.md
            - .claude/settings.json
apiVersion: v1
kind: WaveManifest
metadata:
    description: An interactive platform for learning CSS through practical challenges
    name: code-crispies
ontology:
    telos: Interactive self-learning platform for web technologies (CSS, HTML, JavaScript, Markdown)
personas:
    auditor:
        adapter: claude
        description: Security review and quality assurance
        model: claude-haiku
        permissions:
            allowed_tools:
                - Read
                - Write
                - Grep
                - Glob
                - Bash
            deny:
                - Edit(*)
                - Bash(rm -rf /*)
                - Bash(git push*)
                - Bash(git commit*)
        system_prompt_file: .wave/personas/auditor.md
        temperature: 0.1
    craftsman:
        adapter: claude
        description: Code implementation and testing
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
            deny:
                - Bash(rm -rf /*)
        system_prompt_file: .wave/personas/craftsman.md
        temperature: 0.7
    debugger:
        adapter: claude
        description: Systematic debugging and root cause analysis
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Glob
                - Grep
                - Bash
            deny:
                - Edit(*)
                - Bash(rm -rf /*)
                - Bash(git push*)
                - Bash(git commit*)
        system_prompt_file: .wave/personas/debugger.md
        temperature: 0.1
    gitea-analyst:
        adapter: claude
        description: Gitea issue analysis and scanning
        permissions:
            allowed_tools:
                - Read
                - Write
                - Bash(tea issues view*)
                - Bash(tea issues list*)
                - Bash(tea releases list*)
                - Bash(tea pulls view*)
                - Bash(tea pulls list*)
                - Bash(tea --version)
                - Bash(git log*)
                - Bash(git status*)
                - Bash(ls *)
            deny:
                - Bash(tea issues edit*)
                - Bash(tea issues create*)
                - Bash(tea issues close*)
                - Bash(gh *)
                - Bash(glab *)
                - Edit(*)
        system_prompt_file: .wave/personas/gitea-analyst.md
        temperature: 0.1
    gitea-commenter:
        adapter: claude
        description: Posts comments on Gitea issues and pull requests
        permissions:
            allowed_tools:
                - Read
                - Write
                - Bash(tea issues comment*)
                - Bash(tea pulls create*)
                - Bash(tea --version)
                - Bash(git push*)
                - Bash(git status*)
                - Bash(git log*)
                - Bash(git remote*)
                - Bash(git diff*)
            deny:
                - Bash(tea issues edit*)
                - Bash(tea issues close*)
                - Bash(tea pulls merge*)
                - Bash(tea pulls close*)
                - Bash(gh *)
                - Bash(glab *)
                - Edit(*)
        system_prompt_file: .wave/personas/gitea-commenter.md
        temperature: 0.2
    gitea-enhancer:
        adapter: claude
        description: Gitea issue enhancement and improvement
        permissions:
            allowed_tools:
                - Read
                - Write
                - Bash(tea issues edit*)
                - Bash(tea issues view*)
                - Bash(tea --version)
            deny:
                - Bash(tea issues create*)
                - Bash(tea issues close*)
                - Bash(gh *)
                - Bash(glab *)
                - Edit(*)
        system_prompt_file: .wave/personas/gitea-enhancer.md
        temperature: 0.2
    gitea-scoper:
        adapter: claude
        description: Gitea epic analysis, decomposition, and sub-issue creation
        permissions:
            allowed_tools:
                - Read
                - Write
                - Bash(tea issues create*)
                - Bash(tea issues view*)
                - Bash(tea issues list*)
                - Bash(tea --version)
            deny:
                - Bash(tea issues edit*)
                - Bash(tea issues close*)
                - Bash(gh *)
                - Bash(glab *)
                - Edit(*)
        system_prompt_file: .wave/personas/gitea-scoper.md
        temperature: 0.1
    pedagogy-auditor:
        adapter: claude
        description: Instructional design expert evaluating exercise quality
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Bash
                - Glob
                - Grep
            deny:
                - Edit(*)
                - Bash(rm -rf /*)
                - Bash(git push*)
                - Bash(git commit*)
        system_prompt_file: .wave/personas/pedagogy-auditor.md
        temperature: 0.2
    implementer:
        adapter: claude
        description: Execution specialist for code changes and structured output
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
                - Glob
                - Grep
            deny:
                - Bash(rm -rf /*)
                - Bash(sudo *)
        system_prompt_file: .wave/personas/implementer.md
        temperature: 0.3
    navigator:
        adapter: claude
        description: Read-only codebase exploration and analysis
        model: claude-haiku
        permissions:
            allowed_tools:
                - Read
                - Write
                - Glob
                - Grep
                - Bash(git log*)
                - Bash(git status*)
            deny:
                - Edit(*)
                - Bash(git commit*)
                - Bash(git push*)
        system_prompt_file: .wave/personas/navigator.md
        temperature: 0.1
    philosopher:
        adapter: claude
        description: Architecture design and specification
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
                - Glob
                - Grep
            deny: []
        system_prompt_file: .wave/personas/philosopher.md
        temperature: 0.3
    planner:
        adapter: claude
        description: Task breakdown and planning
        model: claude-haiku
        permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
                - Glob
                - Grep
            deny: []
        system_prompt_file: .wave/personas/planner.md
        temperature: 0.2
    provocateur:
        adapter: claude
        description: Creative challenger for divergent thinking and complexity hunting
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Glob
                - Grep
                - Bash(wc *)
                - Bash(git log*)
                - Bash(git diff*)
                - Bash(find*)
                - Bash(ls*)
            deny:
                - Edit(*)
                - Bash(git commit*)
                - Bash(git push*)
                - Bash(rm*)
        system_prompt_file: .wave/personas/provocateur.md
        temperature: 0.8
    researcher:
        adapter: claude
        description: Deep codebase research and analysis
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
                - Glob
                - Grep
                - WebSearch
                - WebFetch
            deny: []
        system_prompt_file: .wave/personas/researcher.md
        temperature: 0.1
    reviewer:
        adapter: claude
        description: Code review and quality checks
        permissions:
            allowed_tools:
                - Read
                - Write
                - Glob
                - Grep
                - Bash
            deny:
                - Write(*.go)
                - Write(*.ts)
                - Write(*.py)
                - Write(*.rs)
                - Edit(*)
                - Bash(rm *)
                - Bash(git push*)
                - Bash(git commit*)
        system_prompt_file: .wave/personas/reviewer.md
        temperature: 0.1
    summarizer:
        adapter: claude
        description: Context compaction for relay handoffs
        model: claude-haiku
        permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
                - Glob
                - Grep
            deny: []
        system_prompt_file: .wave/personas/summarizer.md
        temperature: 0
    supervisor:
        adapter: claude
        description: Work supervision and quality evaluation
        model: claude-opus
        permissions:
            allowed_tools:
                - Read
                - Write
                - Glob
                - Grep
                - Bash
            deny:
                - Edit(*)
                - Bash(git push*)
                - Bash(git commit*)
                - Bash(rm*)
        system_prompt_file: .wave/personas/supervisor.md
        temperature: 0.2
    synthesizer:
        adapter: claude
        description: Structured synthesis of analysis findings into actionable JSON proposals
        permissions:
            allowed_tools:
                - Read
                - Write
                - Edit
                - Bash
                - Glob
                - Grep
            deny: []
        system_prompt_file: .wave/personas/synthesizer.md
        temperature: 0.2
    validator:
        adapter: claude
        description: Skeptical analysis and verification of findings against source code
        permissions:
            allowed_tools:
                - Read
                - Write
                - Glob
                - Grep
                - Bash(wc *)
                - Bash(git log*)
                - Bash(git diff*)
            deny:
                - Edit(*)
                - Bash(git commit*)
                - Bash(git push*)
                - Bash(rm*)
        system_prompt_file: .wave/personas/validator.md
        temperature: 0.1
project:
    build_command: npm run build
    flavour: node
    format_command: npm run format
    language: javascript
    lint_command: ""
    skill: javascript
    source_glob: '*.{js,jsx,ts,tsx}'
    test_command: npm test
runtime:
    audit:
        log_all_file_operations: false
        log_all_tool_calls: true
        log_dir: .wave/traces/
    default_timeout_minutes: 30
    max_concurrent_workers: 5
    meta_pipeline:
        max_depth: 2
        max_total_steps: 20
        max_total_tokens: 500000
        timeout_minutes: 60
    relay:
        strategy: summarize_to_checkpoint
        token_threshold_percent: 80
    workspace_root: .wave/workspaces
