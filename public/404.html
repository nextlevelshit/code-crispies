<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Page not found — Code Crispies</title>
		<meta name="robots" content="noindex" />
		<link rel="icon" href="/favicon.ico" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				background: #fafafa;
				color: #1f2937;
				font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
				min-height: 100vh;
				display: grid;
				place-items: center;
			}
			main {
				max-width: 520px;
				padding: 2rem 1.5rem;
				text-align: center;
			}
			.glyph {
				font-size: 5rem;
				line-height: 1;
				margin: 0 0 1rem;
				letter-spacing: -0.05em;
				background: linear-gradient(135deg, #4f46e5, #7c3aed);
				-webkit-background-clip: text;
				background-clip: text;
				color: transparent;
				font-weight: 800;
			}
			h1 {
				font-size: 1.5rem;
				margin: 0 0 0.75rem;
				letter-spacing: -0.01em;
			}
			p {
				color: #6b7280;
				margin: 0 0 1.75rem;
			}
			.cta {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				padding: 0.7rem 1.25rem;
				background: #4f46e5;
				color: #fff;
				text-decoration: none;
				border-radius: 8px;
				font-weight: 600;
				transition: background 0.15s;
			}
			.cta:hover {
				background: #4338ca;
			}
			.links {
				margin-top: 2rem;
				font-size: 0.95rem;
				color: #6b7280;
			}
			.links a {
				color: #4f46e5;
				margin: 0 0.5rem;
			}
		</style>
	</head>
	<body>
		<main>
			<p class="glyph">404</p>
			<h1>This crisp doesn't exist.</h1>
			<p>The page you're looking for moved, was renamed, or never existed. Try a section below or jump back to the start.</p>
			<a href="/" class="cta">▶ Back to lessons</a>
			<nav class="links">
				<a href="/css/">CSS</a> ·
				<a href="/html/">HTML</a> ·
				<a href="/javascript/">JavaScript</a> ·
				<a href="/markdown/">Markdown</a> ·
				<a href="/blog/">Blog</a>
			</nav>
		</main>
	</body>
</html>
